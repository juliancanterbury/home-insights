<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home Insights</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
:root{--bg:#02090f;--panel:#061925;--panel2:#092334;--line:#0b86ac;--cyan:#00d4ff;--green:#22f06e;--yellow:#ffd21a;--orange:#ff7a18;--red:#ff4e42;--muted:#86a4b6;--text:#effbff;--soft:#0e3146}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;background:radial-gradient(circle at 70% 10%,#082235 0,#02090f 42%,#000 100%);font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);overflow:hidden}button{font:inherit}.shell{display:grid;grid-template-columns:210px 1fr;height:100vh}.sidebar{background:linear-gradient(180deg,#04131d,#02080e);border-right:1px solid #0f4058;padding:22px 14px;display:flex;flex-direction:column;gap:20px}.brand{display:flex;gap:10px;align-items:center}.brand .icon{font-size:25px;color:var(--cyan)}.brand h1{font-size:21px;line-height:19px;margin:0;font-weight:900;letter-spacing:.8px}.brand span{font-size:11px;color:var(--green);font-weight:800}.nav{display:flex;flex-direction:column;gap:8px}.nav button{border:0;border-radius:9px;background:transparent;color:#dcecf6;text-align:left;padding:11px 12px;cursor:pointer}.nav button:hover,.nav button.active{background:#0c3a54;color:#fff;box-shadow:inset 3px 0 var(--cyan)}.status{margin-top:auto;border-top:1px solid #12384c;padding-top:18px;color:#b9d2de;font-size:13px}.status h3{font-size:11px;color:#9fb7c5;letter-spacing:2px}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:7px}.user{display:flex;gap:10px;align-items:center;color:#cce2ec}.avatar{width:31px;height:31px;border-radius:50%;display:grid;place-items:center;background:#143a57}.app{height:100vh;overflow:auto;padding:18px 22px 40px}.topbar{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid #0f4b68;border-radius:13px;background:#061925;overflow:hidden;margin-bottom:16px}.metric{padding:12px 18px;border-right:1px solid #164359}.metric:last-child{border-right:0}.metric span{text-transform:uppercase;color:#7ea5b7;font-size:10px}.metric strong{display:block;font-size:20px;margin-top:3px}.metric small{display:block;color:#a9c0cc;font-size:12px}.green{color:var(--green)!important}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:linear-gradient(180deg,rgba(9,35,52,.95),rgba(3,15,23,.92));border:1px solid #0d4966;border-radius:14px;padding:16px;box-shadow:0 0 30px rgba(0,212,255,.04);position:relative;min-height:130px}.card h2{margin:0 0 12px;font-size:15px;letter-spacing:1px;text-transform:uppercase}.card .max{position:absolute;right:12px;top:12px;background:#07405e;border:1px solid #0b6c91;color:var(--cyan);border-radius:7px;padding:5px 8px;cursor:pointer}.hero{grid-column:span 6;min-height:430px}.wide{grid-column:span 6}.third{grid-column:span 4}.quarter{grid-column:span 3}.full{grid-column:span 12}.statline{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:14px}.stat{background:#071b28;border:1px solid #124c67;border-radius:12px;padding:14px}.stat span{text-transform:uppercase;letter-spacing:2px;color:#8eb0c1;font-weight:800;font-size:12px}.stat strong{font-size:28px;display:block;margin-top:10px}.stat em{font-style:normal;color:var(--cyan);font-size:15px}.flow{position:relative;height:330px}.node{position:absolute;width:110px;height:68px;border:1px solid #2bb8e8;border-radius:12px;background:#082333;display:grid;place-items:center;text-align:center;font-weight:800}.node small{display:block;color:var(--cyan);font-size:15px;margin-top:6px}.solar{left:6%;top:36%}.home{left:43%;top:34%}.gridn{right:8%;top:36%}.battery{left:43%;bottom:8%}.line{position:absolute;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent);height:4px;border-radius:20px;box-shadow:0 0 14px var(--cyan);animation:flow 2s linear infinite}.line.l1{left:25%;right:50%;top:47%}.line.l2{left:53%;right:22%;top:47%;background:linear-gradient(90deg,transparent,var(--orange),var(--red),transparent)}.line.l3{width:4px;height:120px;left:48.5%;top:55%;background:linear-gradient(180deg,transparent,var(--green),transparent)}@keyframes flow{0%{filter:hue-rotate(0)}50%{opacity:.55}100%{filter:hue-rotate(360deg)}}.weatherHero{display:grid;grid-template-columns:1.2fr repeat(5,1fr);gap:12px;margin-bottom:12px}.wcard{background:#071d2b;border:1px solid #124963;border-radius:12px;padding:14px;min-height:110px}.wbig{font-size:42px;font-weight:800}.iconline{display:flex;gap:14px;align-items:end;justify-content:space-between;padding:8px 2px 0;color:#e7f9ff}.iconline div{text-align:center;font-size:22px}.iconline small{display:block;font-size:10px;color:#9ab4c3;margin-top:5px}.timeline{display:flex;gap:20px;align-items:center;height:80px;position:relative}.timeline:before{content:"";position:absolute;left:0;right:0;top:39px;height:2px;background:#16475e}.event{position:relative;z-index:1;background:#092638;border:1px solid #16607f;border-radius:999px;padding:9px 12px;color:#dff7ff}.alerts{display:grid;gap:10px}.alert{border-left:3px solid var(--green);background:#081d29;padding:10px;border-radius:8px}.panelList{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;z-index:10;padding:28px}.modal.open{display:block}.modal .inner{height:100%;background:#04131d;border:1px solid #1680a6;border-radius:18px;padding:20px}.close{position:absolute;right:38px;top:38px;background:#06384f;color:#fff;border:1px solid #0b6c91;border-radius:8px;padding:8px 11px;cursor:pointer;z-index:20}@media(max-width:1000px){.shell{grid-template-columns:1fr}.sidebar{display:none}.topbar{grid-template-columns:repeat(2,1fr)}.hero,.wide,.third,.quarter,.full{grid-column:span 12}.statline,.weatherHero,.panelList{grid-template-columns:1fr}.app{padding:12px}}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand"><div class="icon">⌂</div><div><h1>HOME<br>INSIGHTS</h1><span>LIVE OVERVIEW</span></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="status"><h3>SYSTEM STATUS</h3><p><i class="dot"></i>Data local</p><p><i class="dot"></i>GitHub Pages</p><p><i class="dot"></i>Sheet link next</p></div>
    <div class="user"><div class="avatar">JC</div><div><strong>Julian</strong><br><small>Home workspace</small></div></div>
  </aside>
  <main class="app">
    <header class="topbar">
      <div class="metric"><span>Time</span><strong id="clock">--:--</strong><small>Melbourne</small></div>
      <div class="metric"><span>Weather</span><strong>16° 🌤</strong><small>Brunswick</small></div>
      <div class="metric"><span>Home mode</span><strong class="green">AUTO</strong><small>Optimised</small></div>
      <div class="metric"><span>Battery</span><strong class="green">89%</strong><small>14.3 kWh</small></div>
      <div class="metric"><span>Grid status</span><strong class="green">Importing</strong><small>312 W</small></div>
      <div class="metric"><span>Energy today</span><strong>8.7 <em>kWh</em></strong><small>+12% vs yesterday</small></div>
      <div class="metric"><span>Water last bill</span><strong>29 <em>kL</em></strong><small>-8% vs previous</small></div>
    </header>
    <section id="view"></section>
  </main>
</div>
<div class="modal" id="modal"><button class="close" onclick="closeModal()">Close</button><div class="inner" id="modalInner"></div></div>
<script>
const navItems=['Overview','Energy','Solar','Battery','Gas','Water','Weather','Costs','Timeline','Assets'];
const icons={Overview:'▦',Energy:'⚡',Solar:'☀',Battery:'▣',Gas:'🔥',Water:'💧',Weather:'☁',Costs:'$',Timeline:'◷',Assets:'▣'};
const water=[['26 Mar 2021',63,636],['24 Jun 2021',23,258],['20 Sep 2021',15,174],['31 Dec 2021',49,544],['28 Mar 2022',55,550],['1 Jul 2022',23,242],['26 Sep 2022',14,182],['23 Dec 2022',32,333],['24 Mar 2023',56,602],['28 Jun 2023',32,333],['25 Sep 2023',16,4000],['22 Dec 2023',29,319],['26 Mar 2024',46,484],['21 Jun 2024',39,453],['17 Sep 2024',23,256],['18 Dec 2024',50,549],['25 Mar 2025',71,755],['23 Jun 2025',44,484],['16 Sep 2025',30,345],['19 Dec 2025',42,447],['24 Mar 2026',73,768],['22 Jun 2026',29,330]];
function initNav(){nav.innerHTML=navItems.map((n,i)=>`<button data-page="${n}" class="${i===0?'active':''}">${icons[n]} ${n}</button>`).join('');nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{nav.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render(b.dataset.page)});}
function card(title,body,cls='third'){return `<div class="card ${cls}"><button class="max" onclick="maximise(this)">⛶</button><h2>${title}</h2>${body}</div>`}
function stats(){return `<div class="statline"><div class="stat"><span>Solar 30 days</span><strong>297 <em>kWh</em></strong></div><div class="stat"><span>Grid import</span><strong>516 <em>kWh</em></strong></div><div class="stat"><span>Grid export</span><strong>6 <em>kWh</em></strong></div><div class="stat"><span>House load</span><strong>786 <em>kWh</em></strong></div><div class="stat"><span>Water last bill</span><strong>29 <em>kL</em></strong></div><div class="stat"><span>Latest bill</span><strong>$299</strong></div></div>`}
function flow(){return `<div class="flow"><div class="node solar">☀ Solar<small>5.6 kW</small></div><div class="node home">⌂ Home<small>2.8 kW</small></div><div class="node gridn">↔ Grid<small>0.3 kW</small></div><div class="node battery">▣ Battery<small>89%</small></div><div class="line l1"></div><div class="line l2"></div><div class="line l3"></div></div>`}
function weatherCards(){return `<div class="weatherHero"><div class="wcard"><div class="wbig">16.2° 🌤</div><p>Feels like 15.8°</p><strong>Partly cloudy</strong><br><small>Brunswick, VIC</small></div><div class="wcard"><b>Today</b><h2>18° / 9°</h2><p>☀ Mostly sunny</p></div><div class="wcard"><b>Tomorrow</b><h2>16° / 10°</h2><p>🌧 Rain</p></div><div class="wcard"><b>Wind</b><h2>22 km/h</h2><p>NW</p></div><div class="wcard"><b>Humidity</b><h2>68%</h2><p>Comfortable</p></div><div class="wcard"><b>Sun</b><h2>07:16</h2><p>Sunrise</p></div></div><div class="iconline">${['☀','🌤','☀','☁','🌧','🌧','☀','🌤','☁','🌦','☀','🌧'].map((i,k)=>`<div>${i}<small>${k+7}:00</small></div>`).join('')}</div>`}
function render(page='Overview'){const pages={Overview:overview,Energy:energy,Solar:solar,Battery:battery,Gas:gas,Water:waterPage,Weather:weatherPage,Costs:costs,Timeline:timeline,Assets:assets};view.innerHTML=pages[page]();setTimeout(drawAll,50)}
function overview(){return stats()+`<div class="grid">${card('Live Energy Flow',flow(),'hero')}${card('Weather',weatherCards()+`<div id="weatherMini" style="height:220px"></div>`,'wide')}${card('Water',`<div id="waterMini" style="height:260px"></div>`,'third')}${card('Costs',`<div id="costPie" style="height:260px"></div>`,'third')}${card('Live Alerts',`<div class="alerts"><div class="alert">Battery charging during free window</div><div class="alert">Rain likely tomorrow</div><div class="alert">Water use normal this quarter</div></div>`,'third')}${card('Timeline',`<div class="timeline"><span class="event">Heat pump HWS</span><span class="event">Battery</span><span class="event">OVO</span><span class="event">Split installed</span></div>`,'full')}</div>`}
function energy(){return `<div class="grid">${card('Energy Flow',flow(),'wide')}${card('Energy + Gas Comparison',`<div id="energyChart" style="height:390px"></div>`,'wide')}${card('Monthly Electricity',`<div id="monthlyChart" style="height:360px"></div>`,'full')}</div>`}
function waterPage(){return `<div class="grid">${card('Water Overview',`<div class="statline"><div class="stat"><span>Last bill</span><strong>29 <em>kL</em></strong></div><div class="stat"><span>Average</span><strong>330 <em>L/day</em></strong></div><div class="stat"><span>Total</span><strong>$299</strong></div></div><div id="waterFull" style="height:470px"></div>`,'full')}</div>`}
function weatherPage(){return `<div class="grid">${card('Apple-style Weather',weatherCards()+`<div id="weatherFull" style="height:430px"></div>`,'full')}</div>`}
function costs(){return `<div class="grid">${card('Cost Breakdown',`<div id="costPieBig" style="height:420px"></div>`,'wide')}${card('Bills',`<div class="panelList"><div class="stat"><span>Electricity</span><strong>$164</strong></div><div class="stat"><span>Water</span><strong>$62</strong></div><div class="stat"><span>Gas</span><strong>$55</strong></div></div>`,'wide')}</div>`}
function timeline(){return `<div class="grid">${card('House Timeline',`<div class="timeline"><span class="event">2018 Solar installed</span><span class="event">2025 HWS</span><span class="event">2025 Battery</span><span class="event">2026 Split</span><span class="event">2026 OVO</span></div>`,'full')}</div>`}
function assets(){return `<div class="grid">${card('Assets',`<div class="panelList"><div class="stat"><span>Battery</span><strong>Sigenergy</strong></div><div class="stat"><span>HWS</span><strong>Rinnai</strong></div><div class="stat"><span>Split</span><strong>Mitsubishi</strong></div></div>`,'full')}</div>`}
function solar(){return `<div class="grid">${card('Solar',`<div id="solarChart" style="height:440px"></div>`,'full')}</div>`}
function battery(){return `<div class="grid">${card('Battery',`<div id="batteryChart" style="height:440px"></div>`,'full')}</div>`}
function gas(){return `<div class="grid">${card('Gas',`<div id="gasChart" style="height:440px"></div>`,'full')}</div>`}
function makeWeather(id){let x=[],t=[],r=[],mn=[],mx=[];let start=new Date('2025-05-01');for(let i=0;i<390;i++){let d=new Date(start);d.setDate(d.getDate()+i);x.push(d);let seasonal=16+7*Math.sin((i-120)/365*6.28);let val=seasonal+(Math.random()-.5)*7;t.push(val);mn.push(val-5-Math.random()*2);mx.push(val+5+Math.random()*2);r.push(Math.random()>.82?Math.random()*18:0)}Plotly.newPlot(id,[{x,y:t,type:'scatter',mode:'lines',name:'Temperature °C',line:{color:'#ffd21a',width:2},fill:'tonexty',fillcolor:'rgba(255,210,26,.08)'},{x,y:mn,type:'scatter',mode:'lines',name:'Min °C',line:{color:'rgba(255,255,255,.35)',dash:'dot'}},{x,y:mx,type:'scatter',mode:'lines',name:'Max °C',line:{color:'rgba(255,255,255,.35)',dash:'dot'}},{x,y:r,type:'bar',name:'Rainfall mm',yaxis:'y2',marker:{color:'rgba(0,212,255,.45)'}}],plotLayout('Weather',{y2:true}))}
function makeWater(id){Plotly.newPlot(id,[{x:water.map(d=>d[0]),y:water.map(d=>d[1]),type:'bar',name:'Bill kL',marker:{color:'#00d4ff'}},{x:water.map(d=>d[0]),y:water.map(d=>Math.min(d[2],900)),type:'scatter',mode:'lines+markers',name:'L/day',yaxis:'y2',line:{color:'#22f06e',shape:'hv',width:2}}],plotLayout('Water',{y2:true}))}
function makeEnergy(id){let x=[],a=[],b=[],c=[],g=[];for(let i=0;i<220;i++){let d=new Date('2025-11-01');d.setDate(d.getDate()+i);x.push(d);a.push(22+10*Math.sin(i/30)+(Math.random()-.5)*6);b.push(15+Math.random()*10);c.push(-8-Math.random()*18);g.push(120+60*Math.sin(i/45)+Math.random()*30)}Plotly.newPlot(id,[{x,y:a,type:'scatter',mode:'lines',name:'Solar kWh',line:{color:'#22f06e'}},{x,y:b,type:'scatter',mode:'lines',name:'House load kWh',line:{color:'#2b7dff'}},{x,y:c,type:'scatter',mode:'lines',name:'Grid export kWh',line:{color:'#00d4ff'}},{x,y:g,type:'scatter',mode:'lines',name:'Gas MJ/day',yaxis:'y2',line:{color:'#ff7a18'}}],plotLayout('Energy + Gas',{y2:true}))}
function simpleChart(id,name,color){let x=[],y=[];for(let i=0;i<160;i++){let d=new Date('2026-01-01');d.setDate(d.getDate()+i);x.push(d);y.push(20+12*Math.sin(i/20)+Math.random()*8)}Plotly.newPlot(id,[{x,y,type:'scatter',mode:'lines',name,line:{color}}],plotLayout(name,{}))}
function makeCost(id){Plotly.newPlot(id,[{values:[164,62,55,31],labels:['Electricity','Water','Gas','Other'],type:'pie',hole:.55,marker:{colors:['#00d4ff','#22f06e','#ff7a18','#a855f7']},textinfo:'none'}],{paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#effbff'},margin:{l:10,r:10,t:10,b:10},showlegend:true})}
function plotLayout(title,opt={}){return {paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#dff5ff',size:11},margin:{l:45,r:45,t:15,b:45},legend:{orientation:'h',y:1.15},xaxis:{gridcolor:'rgba(120,200,255,.10)',zeroline:false},yaxis:{gridcolor:'rgba(120,200,255,.10)',zeroline:false,title:''},yaxis2:opt.y2?{overlaying:'y',side:'right',gridcolor:'rgba(0,0,0,0)'}:undefined,modebar:{bgcolor:'transparent',color:'#86a4b6',activecolor:'#00d4ff'}}}
function drawAll(){['weatherMini','weatherFull'].forEach(id=>document.getElementById(id)&&makeWeather(id));['waterMini','waterFull'].forEach(id=>document.getElementById(id)&&makeWater(id));['costPie','costPieBig'].forEach(id=>document.getElementById(id)&&makeCost(id));if(document.getElementById('energyChart'))makeEnergy('energyChart');if(document.getElementById('monthlyChart'))makeEnergy('monthlyChart');if(document.getElementById('solarChart'))simpleChart('solarChart','Solar generation','#ffd21a');if(document.getElementById('batteryChart'))simpleChart('batteryChart','Battery SOC','#22f06e');if(document.getElementById('gasChart'))simpleChart('gasChart','Gas MJ/day','#ff7a18')}
function maximise(btn){const card=btn.closest('.card');modalInner.innerHTML=card.outerHTML.replace('onclick="maximise(this)"','style="display:none"');modal.classList.add('open');setTimeout(drawAll,100)}
function closeModal(){modal.classList.remove('open');modalInner.innerHTML=''}
function tick(){clock.textContent=new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}setInterval(tick,1000);tick();initNav();render('Overview');
</script>
</body>
</html>
