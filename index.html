<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Insights</title>
  <link rel="stylesheet" href="css/app.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><div class="brand-icon">⌂</div><div><h1>HOME INSIGHTS</h1><span>LIVE OVERVIEW</span></div></div>
    <nav id="nav"></nav>
    <div class="status"><h3>SYSTEM STATUS</h3><p><b></b> Data local</p><p><b></b> GitHub Pages</p><p><b></b> Sheet link next</p></div>
    <div class="user"><div class="avatar">JC</div><div><strong>Julian</strong><small>Home workspace</small></div></div>
  </aside>

  <main class="app">
    <header class="topbar">
      <div class="metric"><span>Time</span><strong id="clock">06:14 pm</strong><small>Melbourne</small></div>
      <div class="metric"><span>Weather</span><strong>16° 🌤</strong><small>Brunswick</small></div>
      <div class="metric"><span>Home mode</span><strong class="green">AUTO</strong><small>Optimised</small></div>
      <div class="metric"><span>Battery</span><strong class="green">89%</strong><small>14.3 kWh</small></div>
      <div class="metric"><span>Grid status</span><strong class="green">Importing</strong><small>312 W</small></div>
      <div class="metric"><span>Energy today</span><strong>8.7 <em>kWh</em></strong><small>+12% vs yesterday</small></div>
      <div class="metric"><span>Water last bill</span><strong>29 <em>kL</em></strong><small>-8% vs previous</small></div>
    </header>
    <section id="view" class="view"></section>
  </main>

  <div id="modal" class="modal"><button id="closeModal">×</button><div id="modalContent"></div></div>
  <script src="js/app.js"></script>
</body>
</html>
